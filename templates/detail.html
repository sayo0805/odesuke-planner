<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ spot.name }} | おでかけプランナー</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="/"><h1>🗾 おでかけプランナー</h1></a>
  </header>

  <div class="container">
    <a href="javascript:history.back()" class="back-link">← 検索結果に戻る</a>

    <div class="card">
      <h2>{{ spot.name }}</h2>

      <table>
        <tr>
          <th>エリア</th>
          <td>{{ spot.city }}</td>
        </tr>
        <tr>
          <th>ジャンル</th>
          <td>{{ spot.genre }}</td>
        </tr>
        <tr>
          <th>同行者</th>
          <td>{{ spot.companion }}</td>
        </tr>
        <tr>
          <th>所要時間</th>
          <td>{{ spot.duration }}</td>
        </tr>
      </table>

      <h2>スポット説明</h2>
      <p>{{ spot.description }}</p>

      <br>

      <h2>おすすめポイント</h2>
      <p>{{ spot.point }}</p>
    </div>
  </div>
</body>
</html>
