<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ spot.name }} | おでかけプランナー</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="/"><h1>🗾 おでかけプランナー</h1></a>
  </header>

  <div class="container" style="margin-top: 32px;">
    <a href="javascript:history.back()" class="back-link">← 検索結果に戻る</a>

    <div class="detail-card">
      <h1>{{ spot.name }}</h1>

      <div class="detail-tags">
        <span class="tag tag-city">📍 {{ spot.city }}</span>
        <span class="tag tag-genre">{{ spot.genre }}</span>
        <span class="tag tag-duration">⏱ {{ spot.duration }}</span>
      </div>

      <table>
        <tr>
          <th>同行者</th>
          <td>{{ spot.companion }}</td>
        </tr>
        <tr>
          <th>所要時間</th>
          <td>{{ spot.duration }}</td>
        </tr>
      </table>

      <div class="section-title">スポット説明</div>
      <p class="description-text">{{ spot.description }}</p>

      <div class="section-title">おすすめポイント</div>
      <div class="point-box">✨ {{ spot.point }}</div>
    </div>
  </div>
</body>
</html>
