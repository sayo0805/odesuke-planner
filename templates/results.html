<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索結果 | おでかけプランナー</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="/"><h1>🗾 おでかけプランナー</h1></a>
  </header>

  <div class="container" style="margin-top: 32px;">
    <a href="/" class="back-link">← 検索に戻る</a>

    <div class="results-header">
      <h2>検索結果</h2>
      <span class="results-count">{{ spots|length }}件見つかりました</span>
    </div>

    {% if spots %}
      {% for spot in spots %}
      <div class="card">
        <h2>{{ spot.name }}</h2>
        <div class="card-tags">
          <span class="tag tag-city">📍 {{ spot.city }}</span>
          <span class="tag tag-genre">{{ spot.genre }}</span>
          <span class="tag tag-duration">⏱ {{ spot.duration }}</span>
        </div>
        <p>{{ spot.description }}</p>
        <a href="/spot/{{ spot.id }}" class="detail-link">詳しく見る →</a>
      </div>
      {% endfor %}
    {% else %}
      <div class="no-results">
        <p>条件に合うスポットが見つかりませんでした。</p>
        <a href="/" class="back-link">条件を変えて検索する</a>
      </div>
    {% endif %}
  </div>
</body>
</html>
